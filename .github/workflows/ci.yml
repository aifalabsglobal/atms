name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?sslmode=disable
  NEXTAUTH_SECRET: ci-build-secret-min-32-chars-long
  NEXTAUTH_URL: http://localhost:3000
  ALLOW_IN_MEMORY_RATE_LIMIT: "true"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run db:generate

      - run: npm run typecheck

      - run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

  integration:
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run db:generate

      - name: Apply migrations and seed
        run: |
          npm run db:migrate:deploy
          npm run db:seed

      - name: Build and start server
        run: |
          npm run build
          npm run start &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health; then
              echo "Server ready"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:3000/api/health | grep '"status":"ok"'

      - name: Quick smoke tests
        run: npm run smoke:quick

      - name: Role-based API tests
        run: npm run test:roles
